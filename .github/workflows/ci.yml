name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      gateway: ${{ steps.filter.outputs.gateway }}
      ppe: ${{ steps.filter.outputs.ppe }}
      fall: ${{ steps.filter.outputs.fall }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
            gateway:
              - 'gateway/**'
            ppe:
              - 'ai_ml/ppe_detection/**'
              - 'ai_ml/config.py'
            fall:
              - 'ai_ml/fall_detection/**'
              - 'ai_ml/config.py'
            python:
              - 'gateway/**'
              - 'ai_ml/**'
              - 'tests/**'
              - 'pytest.ini'
              - 'ruff.toml'

  python-quality:
    name: Python lint + tests
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tooling
        run: python -m pip install ruff pytest pytest-asyncio "fastapi[standard]" "uvicorn[standard]" httpx "pydantic-settings>=2.6" "python-multipart>=0.0.12" "redis>=5.0" "aiosqlite>=0.20" "prometheus-client>=0.20" "asyncpg>=0.30" fakeredis
      - name: Lint (ruff)
        run: ruff check gateway ai_ml tests
      - name: Test (pytest)
        run: |
          code=0
          python -m pytest || code=$?
          if [ "$code" -eq 5 ]; then
            echo "::notice::No tests collected yet — test wiring is in place."
            exit 0
          fi
          exit "$code"

  web-quality:
    name: Web lint + typecheck
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint (eslint)
        run: pnpm lint
      - name: Typecheck (tsc)
        run: pnpm exec tsc --noEmit

  docker-app:
    name: Build app image
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  docker-gateway:
    name: Build gateway image
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./gateway
          file: ./gateway/Dockerfile
          push: false
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  docker-ppe:
    name: Build ppe-detection image
    needs: changes
    if: needs.changes.outputs.ppe == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./ai_ml
          file: ./ai_ml/ppe_detection/Dockerfile
          push: false
          cache-from: type=gha,scope=ppe-detection
          cache-to: type=gha,mode=max,scope=ppe-detection

  docker-fall:
    name: Build fall-detection image
    needs: changes
    if: needs.changes.outputs.fall == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./ai_ml
          file: ./ai_ml/fall_detection/Dockerfile
          push: false
          cache-from: type=gha,scope=fall-detection
          cache-to: type=gha,mode=max,scope=fall-detection
