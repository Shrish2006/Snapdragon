name: safeguard

x-safeguard-defaults: &safeguard-defaults
  restart: unless-stopped
  networks:
    - safeguard

services:
  app:
    image: ${IMAGE_REGISTRY:-ghcr.io/shrish2006/snapdragon}/app:${IMAGE_TAG:-latest}
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: safeguard-app
    <<: *safeguard-defaults
    environment:
      NEXT_PUBLIC_BACKEND_BASE_URL: ${APP_BACKEND_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  gateway:
    image: ${IMAGE_REGISTRY:-ghcr.io/shrish2006/snapdragon}/gateway:${IMAGE_TAG:-latest}
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: safeguard-gateway
    <<: *safeguard-defaults
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_PATH: ""
      PPE_URL: ${PPE_URL:-http://ppe-detection:8000}
      FALL_URL: ${FALL_URL:-http://fall-detection:8000}
      EVENT_BUFFER: ${EVENT_BUFFER:-200}
      EVENT_BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      EVENT_STORE_BACKEND: postgres
      MQTT_BROKER_HOST: mqtt
      MQTT_BROKER_PORT: "1883"
      MQTT_USERNAME: gateway
      MQTT_PASSWORD: ${MQTT_GATEWAY_PASSWORD:-changeme}
      MQTT_TOPIC_PREFIX: safeguard
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      POSTGRES_DSN: postgresql://safeguard:safeguard@postgres:5432/safeguard
    ports:
      - "8080:8080"
    depends_on:
      ppe-detection:
        condition: service_started
      fall-detection:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  ppe-detection:
    image: ${IMAGE_REGISTRY:-ghcr.io/shrish2006/snapdragon}/ppe-detection:${IMAGE_TAG:-latest}
    build:
      context: ./ai_ml
      dockerfile: ppe_detection/Dockerfile
    container_name: safeguard-ppe
    <<: *safeguard-defaults
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_PATH: ""
      CAMERA_INDEX: ${CAMERA_INDEX:-0}
      HF_HOME: ${HF_HOME:-/tmp/huggingface}
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8001:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  fall-detection:
    image: ${IMAGE_REGISTRY:-ghcr.io/shrish2006/snapdragon}/fall-detection:${IMAGE_TAG:-latest}
    build:
      context: ./ai_ml
      dockerfile: fall_detection/Dockerfile
    container_name: safeguard-fall
    <<: *safeguard-defaults
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_PATH: ""
    ports:
      - "8002:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: safeguard-postgres
    <<: *safeguard-defaults
    environment:
      POSTGRES_USER: safeguard
      POSTGRES_PASSWORD: safeguard
      POSTGRES_DB: safeguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safeguard"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: safeguard-redis
    <<: *safeguard-defaults
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  safeguard:
    driver: bridge


  mqtt:
    image: eclipse-mosquitto:2
    container_name: safeguard-mqtt
    <<: *safeguard-defaults
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./gateway/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -p 1883 -t healthcheck -m ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
volumes:
  postgres_data:
