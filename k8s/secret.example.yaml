# TEMPLATE — do NOT apply as-is and do NOT commit a filled-in copy.
# This file is intentionally excluded from kustomization.yaml so `kubectl apply -k k8s/`
# never overwrites your real secret.
#
# Required for the postgres backend (see postgres-deployment.yaml and configmap.yaml).
# The PPE model repo is currently public, so HF_TOKEN is OPTIONAL.
#
# Create the secret:
#
#   kubectl create secret generic safeguard-secrets \
#     --namespace safeguard \
#     --from-literal=POSTGRES_PASSWORD=<your-password> \
#     --from-literal=HF_TOKEN=hf_xxx
#
# ...or copy this file, fill it in, and apply it explicitly:
#
#   cp k8s/secret.example.yaml k8s/secret.local.yaml   # git-ignored
#   kubectl apply -f k8s/secret.local.yaml
apiVersion: v1
kind: Secret
metadata:
  name: safeguard-secrets
  namespace: safeguard
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_ME"
  HF_TOKEN: "REPLACE_ME"
