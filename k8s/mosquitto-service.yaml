apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: safeguard
  labels:
    app.kubernetes.io/name: mosquitto
spec:
  # NodePort 31883 — firmware targets 138.201.157.147:31883 from the field.
  # Ensure VPS firewall allows TCP 31883 inbound.
  type: NodePort
  selector:
    app.kubernetes.io/name: mosquitto
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
      nodePort: 31883
