apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: safeguard
  labels:
    app.kubernetes.io/name: mosquitto
spec:
  # ClusterIP: internal-only.  Helmets on the physical network must reach the
  # broker via a NodePort or LoadBalancer service added separately.
  # To expose externally:
  #   kubectl patch svc mosquitto -n safeguard -p '{"spec":{"type":"LoadBalancer"}}'
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mosquitto
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
