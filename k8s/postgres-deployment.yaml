apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: safeguard
  labels:
    app.kubernetes.io/name: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: safeguard
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: safeguard-secrets
                  key: POSTGRES_PASSWORD
                  optional: false
            - name: POSTGRES_DB
              value: safeguard
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "safeguard"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "safeguard"]
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
