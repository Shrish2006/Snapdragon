apiVersion: v1
kind: ConfigMap
metadata:
  name: safeguard-config
  namespace: safeguard
data:
  LOG_LEVEL: "INFO"
  LOG_FILE_PATH: "/logs/project.log"
  HF_REPO: "gauravp22/vyra-yolo-ppe-detection"
  HF_FILE: "best.pt"
  CAMERA_INDEX: "1"
  HF_HOME: "/cache"
  PPE_URL: "http://ppe-detection:8000"
  FALL_URL: "http://fall-detection:8000"
  EVENT_BUFFER: "200"
  EVENT_BUS_BACKEND: "redis"
  REDIS_URL: "redis://redis:6379/0"
  EVENT_STORE_BACKEND: "postgres"
  POSTGRES_DSN: "postgresql://safeguard:safeguard@postgres:5432/safeguard"
  NEXT_PUBLIC_BACKEND_BASE_URL: "https://api-snapdragon.upayan.dev"
  CORS_ALLOW_ORIGINS: "https://snapdragon.upayan.dev"
  MQTT_BROKER_HOST: "mosquitto"
  MQTT_BROKER_PORT: "1883"
  MQTT_USERNAME: "gateway"
  MQTT_TOPIC_PREFIX: "safeguard"
