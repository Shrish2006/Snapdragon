apiVersion: apps/v1
kind: Deployment
metadata:
  name: fall-detection
  namespace: safeguard
  labels:
    app.kubernetes.io/name: fall-detection
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fall-detection
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fall-detection
    spec:
      containers:
        - name: fall-detection
          image: ghcr.io/shrish2006/snapdragon/fall-detection:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: safeguard-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          # fall_detection currently exposes only /health; use it for both probes.
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
