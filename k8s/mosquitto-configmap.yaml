apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: safeguard
data:
  # Production broker config — anonymous access disabled; per-device ACLs.
  # The passwd file must contain hashed credentials (see secret.example.yaml
  # note) or be replaced by an auth plugin.  Generate hashes with:
  #   mosquitto_passwd -b passwd gateway <password>
  #   mosquitto_passwd -b passwd helmet-01 <device-password>
  mosquitto.conf: |
    listener 1883 0.0.0.0
    protocol mqtt

    allow_anonymous false
    password_file /mosquitto/config/passwd
    acl_file /mosquitto/config/acl.conf

    log_dest stdout
    log_type error
    log_type warning
    log_type notice
    log_type information

  acl.conf: |
    # Gateway: full access
    user gateway
    topic readwrite safeguard/#

    # Per-device: username must equal helmet_id
    pattern write safeguard/telemetry/%u
    pattern write safeguard/status/%u
    pattern read  safeguard/command/%u/#

  # Hashes generated with: mosquitto_passwd -b passwd <user> <pass>
  # gateway password is stored in safeguard-secrets.MQTT_PASSWORD
  # helmet-01 authenticates with an empty password (firmware default)
  passwd: |
    gateway:$7$1000$0sFb3DV1oM4QMOhwwdGX3k83asRlTsV4Qwq4fn7Jeis18XQJi04BtA/YkTR1v0tvs398TW2aoNFMGj1fmhRwwA==$cfRJ5HnwRk66d4VNHV5WeIVavRr9rTRM8A2lazNucdkSDm/QXDHCK2t2/S4VK2DMOMSdL8Re668qUyBny5q7Bg==
    helmet-01:$7$1000$XyHMmX28d6KA5sVf5IaQIa4I9f+JxB4TM8g8wgsjHeIo49nw9jcfmSZDCQ0lVoCF5QWPLwmWfEcOE8zr/1phIw==$a8BdozbVYVizZc6YP9V3762tkokRBJP39qDr5bslvpLHoBth0ed5LcudoHQ8h2tZSSI24B+aXM4P7vVtI74J8w==
