apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppe-detection
  namespace: safeguard
  labels:
    app.kubernetes.io/name: ppe-detection
spec:
  replicas: 1
  # ONNX Runtime pipeline — CPU-only (QNN/DirectML opt-in via onnxruntime providers).
  # Pinned to the ml-laptop node via nodeSelector + toleration.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ppe-detection
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ppe-detection
    spec:
      nodeSelector:
        safeguard.io/role: ml
      tolerations:
        - key: safeguard.io/ml
          operator: Equal
          value: "true"
          effect: NoSchedule
      # Makes the emptyDir cache writable by the image's non-root user (uid 1000).
      securityContext:
        fsGroup: 1000
      containers:
        - name: ppe-detection
          image: ghcr.io/shrish2006/snapdragon/ppe-detection:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: safeguard-config
            - secretRef:
                name: safeguard-secrets
                optional: true
          # Override log path to stdout — avoids cross-node RWO PVC conflict.
          env:
            - name: LOG_FILE_PATH
              value: ""
          resources:
            requests:
              memory: "1Gi"
              cpu: "2"
            limits:
              memory: "3Gi"
              cpu: "4"
          volumeMounts:
            - name: hf-cache
              mountPath: /cache
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
          # privileged is required for /dev/video* camera access used by /stream.
          securityContext:
            privileged: true
      volumes:
        - name: hf-cache
          emptyDir: {}
