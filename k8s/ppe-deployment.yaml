apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppe-detection
  namespace: safeguard
  labels:
    app.kubernetes.io/name: ppe-detection
spec:
  replicas: 1
  # A single GPU can't be shared by two pods, so never surge — replace in place.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ppe-detection
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ppe-detection
    spec:
      runtimeClassName: nvidia
      # Makes the emptyDir cache and the logs PVC writable by the image's non-root
      # user (uid 1000) — the container adds gid 1000 as a supplementary group.
      securityContext:
        fsGroup: 1000
      containers:
        - name: ppe-detection
          image: ghcr.io/shrish2006/snapdragon/ppe-detection:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: safeguard-config
            - secretRef:
                name: safeguard-secrets
                optional: true
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
              nvidia.com/gpu: "1"
            limits:
              memory: "6Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: logs
              mountPath: /logs
            - name: hf-cache
              mountPath: /cache
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
          # privileged is required for /dev/video* camera access used by /stream.
          securityContext:
            privileged: true
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: safeguard-logs
        - name: hf-cache
          emptyDir: {}
