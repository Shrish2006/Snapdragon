# Mosquitto 2.x — dev/compose configuration.
#
# allow_anonymous true  keeps the local stack zero-friction: all services
# sit on the internal Docker `safeguard` bridge and are not reachable from
# outside the host.  Production (K8s) uses a separate config stored in
# `k8s/mosquitto-configmap.yaml` that disables anonymous access and
# enforces per-device ACLs.

listener 1883 0.0.0.0
protocol mqtt

# Optional — enables browser-based MQTT clients over WebSocket.
# Remove if unused to avoid the extra open port.
listener 9001 0.0.0.0
protocol websockets

allow_anonymous true

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
