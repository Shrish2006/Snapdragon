# Mosquitto 2.x ACL — production rules (used by k8s/mosquitto-configmap.yaml).
#
# Not referenced by gateway/mosquitto/mosquitto.conf (dev uses allow_anonymous).
# Copy here for documentation and to keep the authoritative ACL in one place.
#
# `pattern` lines apply to ALL authenticated clients; %u expands to the
# connecting client's MQTT username.  Each helmet username MUST equal its
# helmet_id (e.g. username "helmet-01" → helmet_id "helmet-01").

# Gateway service: full access to the whole safeguard namespace.
user gateway
topic readwrite safeguard/#

# Per-device pattern:
#   - Publish own telemetry and status topics only.
#   - Subscribe to own command subtree only.
pattern write safeguard/telemetry/%u
pattern write safeguard/status/%u
pattern read  safeguard/command/%u/#
